<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Vision Success — The Bear & The North Star (favicon) -->
  <circle cx="60" cy="60" r="60" fill="#07111F"/>

  <!-- compass ring, broken where the star shines -->
  <path d="M 108.4 47.0 A 50 50 0 1 1 83.5 15.8" stroke="#D4AF37" stroke-width="3" stroke-linecap="round"/>

  <!-- Polaris -->
  <path d="M97 12 Q98.8 20 106.3 22.3 Q98.8 24.6 97 32.5 Q95.2 24.6 87.7 22.3 Q95.2 20 97 12 Z" fill="#F5D76E"/>
  <circle cx="97" cy="22.3" r="1.5" fill="#FFFDF5"/>

  <!-- dream trail -->
  <circle cx="83" cy="39" r="1.6" fill="#D4AF37" opacity="0.85"/>
  <circle cx="90" cy="31" r="1.8" fill="#F5D76E"/>

  <!-- ears -->
  <circle cx="41" cy="50" r="7" fill="#F0EAD6"/>
  <circle cx="72" cy="50" r="7" fill="#F0EAD6"/>
  <circle cx="41" cy="50" r="3" fill="#0A1628" opacity="0.13"/>
  <circle cx="72" cy="50" r="3" fill="#0A1628" opacity="0.13"/>

  <!-- head -->
  <circle cx="56" cy="67" r="21.5" fill="#F0EAD6"/>

  <!-- muzzle + nose + smile, gazing up-right -->
  <ellipse cx="61.5" cy="72" rx="9" ry="6.7" fill="#FBF7EA"/>
  <path d="M61.5 66 Q64.8 66.5 64.8 68.6 Q64.8 71 61.5 71 Q58.2 71 58.2 68.6 Q58.2 66.5 61.5 66 Z" fill="#0A1628"/>
  <path d="M61.5 71.3 Q61.5 74 64.2 74.5" stroke="#0A1628" stroke-width="1.2" stroke-linecap="round"/>

  <!-- eyes on the star -->
  <circle cx="48.5" cy="60" r="2.6" fill="#0A1628"/>
  <circle cx="66.5" cy="57.5" r="2.6" fill="#0A1628"/>
  <circle cx="49.5" cy="59" r="0.9" fill="#FFFDF5"/>
  <circle cx="67.5" cy="56.5" r="0.9" fill="#FFFDF5"/>

  <!-- blush -->
  <ellipse cx="42.5" cy="67.5" rx="3.2" ry="1.9" fill="#E05C42" opacity="0.28"/>
  <ellipse cx="70.5" cy="65" rx="3.2" ry="1.9" fill="#E05C42" opacity="0.28"/>

  <!-- gold scarf -->
  <path d="M38.5 80 Q56 90.5 74 79" stroke="#D4AF37" stroke-width="5.5" stroke-linecap="round" fill="none"/>
  <path d="M68.5 82.5 Q71.5 89 69.5 95" stroke="#D4AF37" stroke-width="5" stroke-linecap="round" fill="none"/>
</svg>
