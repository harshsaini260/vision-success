<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#04090F"/>
    </linearGradient>
    <linearGradient id="boxGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5D76E"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="450" fill="url(#bg)"/>
  <rect width="600" height="450" fill="url(#glow)"/>

  <!-- Stars -->
  <circle cx="50" cy="40" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="180" cy="25" r="1" fill="white" opacity="0.4"/>
  <circle cx="420" cy="35" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="550" cy="55" r="1" fill="white" opacity="0.4"/>
  <circle cx="300" cy="30" r="1.5" fill="white" opacity="0.5"/>

  <!-- Sparkles around the box -->
  <text x="280" y="175" font-size="18" fill="#D4AF37" opacity="0.7">✦</text>
  <text x="320" y="170" font-size="12" fill="#D4AF37" opacity="0.5">✦</text>
  <text x="260" y="200" font-size="10" fill="#FFD700" opacity="0.6">✦</text>
  <text x="340" y="205" font-size="14" fill="#D4AF37" opacity="0.6">✦</text>

  <!-- Sweet box (mithai box) -->
  <!-- Box body -->
  <rect x="225" y="215" width="150" height="105" rx="6" fill="url(#boxGold)"/>
  <!-- Box lid -->
  <rect x="218" y="200" width="164" height="25" rx="6" fill="#F5D76E"/>
  <!-- Box pattern lines -->
  <line x1="225" y1="230" x2="375" y2="230" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
  <line x1="225" y1="250" x2="375" y2="250" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
  <!-- Ribbon on box -->
  <line x1="300" y1="200" x2="300" y2="320" stroke="#B8941F" stroke-width="3" opacity="0.7"/>
  <line x1="225" y1="260" x2="375" y2="260" stroke="#B8941F" stroke-width="3" opacity="0.7"/>
  <!-- Bow -->
  <path d="M290,200 Q278,185 270,190 Q262,195 278,205 Z" fill="#B8941F" opacity="0.8"/>
  <path d="M310,200 Q322,185 330,190 Q338,195 322,205 Z" fill="#B8941F" opacity="0.8"/>
  <circle cx="300" cy="202" r="5" fill="#D4AF37"/>

  <!-- "NDA" label on box -->
  <text x="300" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0A1628" font-weight="bold" letter-spacing="3">NDA</text>
  <text x="300" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#0A1628" letter-spacing="2" opacity="0.8">SELECTED</text>

  <!-- Two silhouettes -->
  <!-- Left person -->
  <ellipse cx="165" cy="250" rx="25" ry="25" fill="#1A3A5C"/>
  <rect x="140" y="275" width="50" height="65" fill="#1A3A5C" rx="8"/>
  <!-- Arms extending to hold box -->
  <line x1="190" y1="290" x2="225" y2="270" stroke="#1A3A5C" stroke-width="14" stroke-linecap="round"/>

  <!-- Right person -->
  <ellipse cx="435" cy="250" rx="25" ry="25" fill="#0A2040"/>
  <rect x="410" y="275" width="50" height="65" fill="#0A2040" rx="8"/>
  <line x1="410" y1="290" x2="375" y2="270" stroke="#0A2040" stroke-width="14" stroke-linecap="round"/>

  <!-- Caption -->
  <rect x="120" y="370" width="360" height="52" rx="8" fill="rgba(212,175,55,0.07)" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="300" y="391" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#D4AF37" font-weight="bold" letter-spacing="3">SWEET SUCCESS</text>
  <text x="300" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9AA0AB" letter-spacing="1">Celebrating Achievements — Vision Success</text>
</svg>
