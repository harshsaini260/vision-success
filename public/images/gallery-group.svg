<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#04090F"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="450" fill="url(#bg)"/>
  <rect width="600" height="450" fill="url(#glow)"/>

  <!-- Stars background -->
  <circle cx="40" cy="35" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="120" cy="20" r="1" fill="white" opacity="0.4"/>
  <circle cx="200" cy="50" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="350" cy="30" r="1" fill="white" opacity="0.5"/>
  <circle cx="460" cy="15" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="560" cy="45" r="1" fill="white" opacity="0.6"/>
  <circle cx="580" cy="100" r="1" fill="white" opacity="0.3"/>
  <circle cx="20" cy="200" r="1" fill="white" opacity="0.3"/>
  <circle cx="580" cy="200" r="1.5" fill="white" opacity="0.4"/>

  <!-- Confetti/Balloons -->
  <circle cx="100" cy="120" r="20" fill="#D4AF37" opacity="0.6"/>
  <line x1="100" y1="140" x2="100" y2="175" stroke="#D4AF37" stroke-width="1.5" opacity="0.5"/>

  <circle cx="180" cy="95" r="16" fill="#4A7C59" opacity="0.6"/>
  <line x1="180" y1="111" x2="175" y2="155" stroke="#4A7C59" stroke-width="1.5" opacity="0.5"/>

  <circle cx="420" cy="100" r="18" fill="#2D5282" opacity="0.6"/>
  <line x1="420" y1="118" x2="425" y2="160" stroke="#2D5282" stroke-width="1.5" opacity="0.5"/>

  <circle cx="500" cy="115" r="22" fill="#D4AF37" opacity="0.5"/>
  <line x1="500" y1="137" x2="498" y2="170" stroke="#D4AF37" stroke-width="1.5" opacity="0.5"/>

  <!-- Confetti pieces -->
  <rect x="60" y="160" width="8" height="4" fill="#D4AF37" rx="1" opacity="0.7" transform="rotate(30 64 162)"/>
  <rect x="250" y="140" width="6" height="3" fill="#4A7C59" rx="1" opacity="0.6" transform="rotate(-20 253 141)"/>
  <rect x="350" y="130" width="8" height="4" fill="#D4AF37" rx="1" opacity="0.7" transform="rotate(45 354 132)"/>
  <rect x="450" y="155" width="6" height="3" fill="#2D5282" rx="1" opacity="0.6" transform="rotate(15 453 157)"/>
  <rect x="530" y="145" width="7" height="3" fill="#D4AF37" rx="1" opacity="0.5" transform="rotate(-35 533 147)"/>

  <!-- Group of 5 student silhouettes -->
  <!-- Person 1 (left) -->
  <ellipse cx="130" cy="255" rx="20" ry="20" fill="#1A3A5C"/>
  <rect x="110" y="275" width="40" height="55" fill="#1A3A5C" rx="6"/>

  <!-- Person 2 -->
  <ellipse cx="210" cy="248" rx="22" ry="22" fill="#0A2A4A"/>
  <rect x="188" y="270" width="44" height="60" fill="#0A2A4A" rx="6"/>

  <!-- Person 3 (center, slightly taller) -->
  <ellipse cx="300" cy="240" rx="24" ry="24" fill="#152C55"/>
  <rect x="276" y="264" width="48" height="65" fill="#152C55" rx="6"/>

  <!-- Person 4 -->
  <ellipse cx="390" cy="248" rx="22" ry="22" fill="#0A2A4A"/>
  <rect x="368" y="270" width="44" height="60" fill="#0A2A4A" rx="6"/>

  <!-- Person 5 (right) -->
  <ellipse cx="470" cy="255" rx="20" ry="20" fill="#1A3A5C"/>
  <rect x="450" y="275" width="40" height="55" fill="#1A3A5C" rx="6"/>

  <!-- Arms raised (celebration) -->
  <line x1="130" y1="280" x2="105" y2="255" stroke="#1A3A5C" stroke-width="12" stroke-linecap="round"/>
  <line x1="300" y1="270" x2="275" y2="245" stroke="#152C55" stroke-width="12" stroke-linecap="round"/>
  <line x1="300" y1="270" x2="325" y2="245" stroke="#152C55" stroke-width="12" stroke-linecap="round"/>
  <line x1="470" y1="280" x2="495" y2="255" stroke="#1A3A5C" stroke-width="12" stroke-linecap="round"/>

  <!-- Ground line -->
  <rect x="80" y="328" width="440" height="3" rx="1.5" fill="#D4AF37" opacity="0.15"/>

  <!-- Caption area -->
  <rect x="120" y="355" width="360" height="52" rx="8" fill="rgba(212,175,55,0.07)" stroke="#D4AF37" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="300" y="376" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#D4AF37" font-weight="bold" letter-spacing="3">OUR CHAMPIONS</text>
  <text x="300" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9AA0AB" letter-spacing="1">Students of Vision Success Institute</text>
</svg>
